<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ASTRA BOSS TIMER</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#080c14;--bg2:#0f1520;--bg3:#161e2e;--bg4:#1c2640;
    --border:#1e2d4a;--gold:#e8b830;--gold-dim:#8a7020;
    --cyan:#00c8ff;--cyan-dim:#007799;--green:#3acf6e;
    --red:#e84949;--orange:#e88820;--purple:#9a7fcf;
    --text:#cdd9e8;--text-dim:#6a7f9e;--text-muted:#3d4f6a;
    --text-bright:#eef3fa;--radius:8px;--font:'Segoe UI',system-ui,sans-serif;
  }
  html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .app{height:100vh;display:flex;flex-direction:column;padding:10px 14px;gap:8px;max-width:1500px;margin:0 auto;width:100%}

  .header{display:flex;align-items:center;gap:12px;flex-shrink:0;padding:0 4px;flex-wrap:wrap}
  .brand{font-size:15px;font-weight:800;letter-spacing:.5px;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
  .nav{display:flex;gap:2px;background:var(--bg2);border-radius:6px;padding:2px;border:1px solid var(--border)}
  .nav button{background:none;border:none;color:var(--text-dim);padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;font-family:var(--font);white-space:nowrap}
  .nav button:hover{color:var(--text)}
  .nav button.active{background:var(--bg4);color:var(--gold);box-shadow:0 1px 4px rgba(0,0,0,.3)}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
  .lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}.lang-btn:hover{color:var(--text);border-color:var(--gold-dim)}.lang-btn::first-letter{color:var(--gold)}
  .status{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--text-dim)}
  .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .status-dot.on{background:var(--green)}
  .status-dot.off{background:var(--red)}

  .tab-content{flex:1;min-height:0;display:none;gap:8px}
  .tab-content.active{display:flex;flex-direction:column}

  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;overflow-y:auto;min-height:0}
  .panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .panel-title .sub{color:var(--text-muted);font-weight:400}

  .next-card{background:linear-gradient(135deg,#141c30,#0a0e17);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;position:relative;overflow:hidden}
  .next-card::after{content:'';position:absolute;top:-40%;right:-10%;width:200px;height:200px;background:radial-gradient(circle,rgba(232,184,48,.06) 0%,transparent 70%);pointer-events:none}
  .next-l{display:flex;align-items:center;gap:12px;z-index:1}
  .next-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:600}
  .next-name{font-size:20px;font-weight:800;color:var(--text-bright)}
  .next-meta{display:flex;gap:6px;align-items:center;margin-top:2px}
  .next-tag{font-size:9px;padding:1px 7px;border-radius:3px;font-weight:600}
  .next-tag.iv{background:rgba(0,200,255,.12);color:var(--cyan)}
  .next-tag.sc{background:rgba(154,127,207,.12);color:var(--purple)}
  .next-lv{font-size:10px;color:var(--text-dim);background:var(--bg3);padding:1px 7px;border-radius:3px}
  .next-r{text-align:right;z-index:1;flex-shrink:0}
  .next-cd{font-size:26px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1}
  .next-at{font-size:11px;color:var(--text-dim);margin-top:2px}

  .split2{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;min-height:0}
  .u-entry{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,45,74,.4);gap:6px}
  .u-entry:last-child{border-bottom:none}
  .u-info{display:flex;align-items:center;gap:6px;min-width:0}
  .u-name{font-size:12px;font-weight:600;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .u-lv{font-size:9px;color:var(--text-muted);background:var(--bg3);padding:0 5px;border-radius:2px;flex-shrink:0}
  .u-time{font-size:11px;color:var(--cyan);font-variant-numeric:tabular-nums;white-space:nowrap}
  .u-rem{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .empty{color:var(--text-muted);font-size:11px;font-style:italic;padding:4px 0}

  .sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:5px;overflow-y:auto;min-height:0;align-content:start;padding:2px 0}
  .sched-day{background:var(--bg3);border-radius:6px;padding:8px 10px;border:1px solid transparent}
  .sched-day.tdy{border-color:var(--gold-dim);background:var(--bg4)}
  .sched-dlbl{font-size:11px;font-weight:800;color:var(--purple);text-transform:uppercase;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border);letter-spacing:.5px}
  .sched-day.tdy .sched-dlbl{color:var(--gold);border-bottom-color:var(--gold-dim)}
  .sched-boss{font-size:11px;padding:3px 0;display:flex;justify-content:space-between;align-items:center}
  .sched-boss .nm{color:var(--text)}
  .sched-boss .tm{color:var(--text-dim);font-variant-numeric:tabular-nums}
  .sched-empty{font-size:11px;color:var(--text-muted);font-style:italic;padding:6px 0}

  .iv-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:5px}
  .iv-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px}
  .iv-hdr{font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .iv-hdr .ct{font-size:10px;color:var(--text-muted);font-weight:400}
  .iv-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
  .iv-row .nm{color:var(--text-bright);font-weight:600}
  .iv-row .lv{font-size:10px;color:var(--text-dim)}
  .iv-row .tm{font-size:10px}
  .iv-row .tm.live{color:var(--gold)}
  .iv-row .tm.na{color:var(--text-muted)}

  .export-info{font-size:10px;color:var(--text-muted);text-align:center;padding:4px 0 0;flex-shrink:0}

  @media(max-width:800px){
    .dash-grid{grid-template-columns:1fr}
    .split2{grid-template-columns:1fr}
  }
  @media(max-width:500px){
    .app{padding:6px 8px;gap:4px}
    .brand{font-size:12px}
    .nav button{padding:4px 8px;font-size:10px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand" id="brand">ASTRA BOSS TIMER</div>
    <nav class="nav" id="nav">
      <button class="active" data-tab="dash" id="navDash">Dashboard</button>
      <button data-tab="bosses" id="navBosses">Bosses</button>
    </nav>
    <div class="header-right">
      <button class="lang-btn" id="langBtn">EN</button>
      <span class="status" id="status"><span class="status-dot off"></span><span id="statusText">--</span></span>
    </div>
  </header>

  <div class="tab-content active" id="tab-dash">
    <div class="next-card">
      <div class="next-l">
        <div>
          <div class="next-lbl" id="nextLbl">Next Spawn</div>
          <div class="next-name" id="nextName">--</div>
          <div class="next-meta"><span class="next-lv" id="nextLv"></span><span class="next-tag" id="nextTag"></span></div>
        </div>
      </div>
      <div class="next-r">
        <div class="next-cd" id="nextCd">--:--:--</div>
        <div class="next-at" id="nextAt"></div>
      </div>
    </div>
    <div class="split2">
      <div class="panel">
        <div class="panel-title"><span id="todayLbl">Today</span> <span class="sub" id="todayDate"></span></div>
        <div id="todayList"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span id="tomorrowLbl">Tomorrow</span> <span class="sub" id="tomorrowDate"></span></div>
        <div id="tomorrowList"></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-bosses">
    <div class="split2">
      <div class="panel">
        <div class="panel-title"><span class="tag tag-schedule" id="schedTag" style="font-size:9px;padding:1px 7px;border-radius:3px;background:rgba(154,127,207,.12);color:var(--purple);font-weight:600">Schedule</span> <span id="schedTitle">Weekly Calendar</span></div>
        <div class="sched-grid" id="schedGrid" style="flex:1;min-height:0"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="tag tag-interval" id="ivTag" style="font-size:9px;padding:1px 7px;border-radius:3px;background:rgba(0,200,255,.12);color:var(--cyan);font-weight:600">Interval</span> <span id="ivTitle">Respawn Groups</span></div>
        <div class="iv-grid" id="ivGrid" style="flex:1;display:grid;min-height:0;overflow-y:auto;align-content:start;padding:2px 0"></div>
      </div>
    </div>
  </div>

  <div class="export-info" id="exportInfo"></div>
</div>

<script>
const BOSSES=[
  {id:"Venatus",name:"Venatus",lvl:60,rs:36000},
  {id:"Viorent",name:"Viorent",lvl:65,rs:36000},
  {id:"Ego",name:"Ego",lvl:70,rs:75600},
  {id:"Clemantis",name:"Clemantis",lvl:70,wr:[{d:1,h:12,m:30},{d:4,h:20,m:0}]},
  {id:"Livera",name:"Livera",lvl:75,rs:86400},
  {id:"Araneo",name:"Araneo",lvl:75,rs:86400},
  {id:"Undomiel",name:"Undomiel",lvl:80,rs:86400},
  {id:"Saphirus",name:"Saphirus",lvl:80,wr:[{d:0,h:18,m:0},{d:2,h:12,m:30}]},
  {id:"Neutro",name:"Neutro",lvl:80,wr:[{d:2,h:20,m:0},{d:4,h:12,m:30}]},
  {id:"LadyDalia",name:"Lady Dalia",lvl:85,rs:64800},
  {id:"GeneralAquleus",name:"General Aquleus",lvl:85,rs:104400},
  {id:"Thymele",name:"Thymele",lvl:85,wr:[{d:1,h:20,m:0},{d:3,h:12,m:30}]},
  {id:"Amentis",name:"Amentis",lvl:88,rs:104400},
  {id:"BaronBraudmore",name:"Baron Braudmore",lvl:88,rs:115200},
  {id:"Milavy",name:"Milavy",lvl:90,wr:[{d:6,h:16,m:0}]},
  {id:"Wannitas",name:"Wannitas",lvl:93,rs:172800},
  {id:"Metus",name:"Metus",lvl:93,rs:172800},
  {id:"Duplican",name:"Duplican",lvl:93,rs:172800},
  {id:"Shuliar",name:"Shuliar",lvl:95,rs:126000},
  {id:"Ringor",name:"Ringor",lvl:95,wr:[{d:6,h:18,m:0}]},
  {id:"Roderick",name:"Roderick",lvl:95,wr:[{d:5,h:20,m:0}]},
  {id:"Gareth",name:"Gareth",lvl:98,rs:115200},
  {id:"Titore",name:"Titore",lvl:98,rs:133200},
  {id:"Larba",name:"Larba",lvl:98,rs:126000},
  {id:"Catena",name:"Catena",lvl:100,rs:126000},
  {id:"Auraq",name:"Auraq",lvl:100,wr:[{d:5,h:23,m:0},{d:3,h:22,m:0}]},
  {id:"Secreta",name:"Secreta",lvl:100,rs:223200},
  {id:"Ordo",name:"Ordo",lvl:100,rs:223200},
  {id:"Asta",name:"Asta",lvl:100,rs:223200},
  {id:"Supore",name:"Supore",lvl:100,rs:223200},
  {id:"Chaiflock",name:"Chaiflock",lvl:120,wr:[{d:0,h:16,m:0}]},
  {id:"Benji",name:"Benji",lvl:120,wr:[{d:0,h:22,m:0}]},
  {id:"Libitina",name:"Libitina",lvl:130,wr:[{d:1,h:22,m:0},{d:6,h:22,m:0}]},
  {id:"Rakajeth",name:"Rakajeth",lvl:130,wr:[{d:2,h:23,m:0},{d:0,h:20,m:0}]},
  {id:"Icaruthia",name:"Icaruthia",lvl:135,wr:[{d:2,h:22,m:0},{d:5,h:22,m:0}]},
  {id:"Motti",name:"Motti",lvl:135,wr:[{d:3,h:20,m:0},{d:6,h:20,m:0}]},
  {id:"Camalia",name:"Camalia",lvl:135,wr:[{d:4,h:22,m:0}]},
  {id:"Nevaeh",name:"Nevaeh",lvl:140,wr:[{d:0,h:23,m:0}]},
  {id:"Tumier",name:"Tumier",lvl:140,wr:[{d:0,h:20,m:0}]},
  {id:"Lucus",name:"Lucus",lvl:145,wr:[{d:6,h:23,m:0}]}
];

const TO=9*3600000;
const LANG={
  en:{brand:'ASTRA BOSS TIMER',dash:'Dashboard',bsTab:'Bosses',live:'Live',offline:'Offline',nextSpawn:'Next Spawn',today:'Today',tomorrow:'Tomorrow',noSpawns:'No spawns',schedTag:'Schedule',schedTitle:'Weekly Calendar',ivTag:'Interval',ivTitle:'Respawn Groups',every:'Every',lv:'Lv.',spawned:'SPAWNED',now:'Now',updated:'Updated',ago:'ago',days:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],nm:['Venatus','Viorent','Ego','Clemantis','Livera','Araneo','Undomiel','Saphirus','Neutro','Lady Dalia','General Aquleus','Thymele','Amentis','Baron Braudmore','Milavy','Wannitas','Metus','Duplican','Shuliar','Ringor','Roderick','Gareth','Titore','Larba','Catena','Auraq','Secreta','Ordo','Asta','Supore','Chaiflock','Benji','Libitina','Rakajeth','Icaruthia','Motti','Camalia','Nevaeh','Tumier','Lucus']},
  ja:{brand:'アストラ ボス タイマー',dash:'ダッシュボード',bsTab:'ボス',live:'オンライン',offline:'オフライン',nextSpawn:'次のスポーン',today:'今日',tomorrow:'明日',noSpawns:'スポーンなし',schedTag:'スケジュール',schedTitle:'週間カレンダー',ivTag:'インターバル',ivTitle:'再出現グループ',every:'毎',lv:'Lv.',spawned:'出現中',now:'今',updated:'更新',ago:'前',days:['日','月','火','水','木','金','土'],nm:['ベナトゥス','ビオレント','エゴ','クレメンティス','リベラ','アラネオ','アンドゥミエル','サピルス','ネウトロ','レディ·ダリア','将軍アクレウス','テュメレ','アメンティス','ブラウドモア','ミラベ','ワニタス','メトゥス','デュプリカン','シュライヤー','リンゴル','ロデリック','ガレス','ティトル','ラルバ','カテナ','アウラーク','セクレタ','オルド','アスタ','スポル','シャイフロック','ベンジー','リビティーナ','ラカゼス','イカルシア','モティ','カマリア','ネバ','トゥミエル','ルクス']},
  ko:{brand:'아스트라 보스 타이머',dash:'대시보드',bsTab:'보스',live:'온라인',offline:'오프라인',nextSpawn:'다음 스폰',today:'오늘',tomorrow:'내일',noSpawns:'스폰 없음',schedTag:'일정',schedTitle:'주간 캘린더',ivTag:'간격',ivTitle:'재등장 그룹',every:'매',lv:'레벨',spawned:'출현중',now:'지금',updated:'업데이트',ago:'전',days:['일','월','화','수','목','금','토'],nm:['베나투스','비오렌트','에고','클레멘티스','리베라','아라네오','안두미엘','사피루스','네우트로','레이디 달리아','장군 아클레우스','튜메레','아멘티스','남작 브라우드모어','미라베','와니타스','메투스','듀플리칸','슈라이어','링고르','로데릭','가레스','티토르','라르바','카테나','아우라크','세크레타','오르도','아스타','스포르','샤이플록','벤지','리비티나','라카제스','이카루시아','모티','카말리아','네바','투미엘','루크스']}
};
let lang='en';
function t(k){return LANG[lang][k]||k}
function bn(b){const i=BOSSES.indexOf(b);return LANG[lang].nm[i]||b.name}
function langNext(){
  const ls=['en','ja','ko'];
  lang=ls[(ls.indexOf(lang)+1)%ls.length];
  localStorage.setItem('astralang',lang);
  applyLang();rAll()
}
function applyLang(){
  $('brand').textContent=t('brand');
  $('navDash').textContent=t('dash');
  $('navBosses').textContent=t('bsTab');
  $('nextLbl').textContent=t('nextSpawn');
  $('todayLbl').textContent=t('today');
  $('tomorrowLbl').textContent=t('tomorrow');
  $('schedTag').textContent=t('schedTag');
  $('schedTitle').textContent=t('schedTitle');
  $('ivTag').textContent=t('ivTag');
  $('ivTitle').textContent=t('ivTitle');
  $('langBtn').textContent=lang.toUpperCase();
}

let timers={};
let nxtBoss=null,nxtTime=null;

function p2(n){return String(n).padStart(2,'0')}
function now(){return Date.now()}

function fmt(ms){return new Date(ms).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Tokyo'})}
function fmtD(ms){return new Date(ms).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'Asia/Tokyo'})}
function fmtT(ms){return new Date(ms).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Tokyo'})}
function fmtDur(ms){if(ms<=0)return t('spawned');const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return d?`${d}d ${h}h`:h?`${h}h ${m}m`:`${m}m ${p2(s%60)}s`}
function fmtShort(ms){if(ms<=0)return t('now');const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return d?`${d}d ${h}h`:h?`${h}h ${m}m`:`${m}m`}
function fmtInt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return m?`${h}h ${m}m`:`${h}h`}

function nextSpawn(b){
  const t=timers[b.id];
  if(b.rs){return t?.endTime?new Date(t.endTime):null}
  if(b.wr){const n=now(),base=new Date(n+TO);let best=null;for(const w of b.wr){const c=new Date(base),del=(w.d+7-base.getUTCDay())%7;c.setUTCDate(base.getUTCDate()+del);c.setUTCHours(w.h,w.m,0,0);let r=c.getTime()-TO;if(r<n)r+=604800000;if(!best||r<best)best=r}return best?new Date(best):null}
  return null
}
function schedB(){return BOSSES.filter(b=>b.wr)}
function intB(){return BOSSES.filter(b=>b.rs)}
function grpInt(){const g={};for(const b of intB()){const k=b.rs;if(!g[k])g[k]={s:k,b:[]};g[k].b.push(b)}return Object.values(g).sort((a,b)=>a.s-b.s)}

document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'))
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'))
  b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active')
})


function rNext(){
  let bb=null,bs=null,cn=now();
  for(const b of BOSSES){const n=nextSpawn(b);if(n&&n.getTime()>cn&&(!bs||n.getTime()<bs.getTime())){bs=n;bb=b}}
  if(bb&&bs){
    $('nextName').textContent=bn(bb);$('nextLv').textContent=t('lv')+bb.lvl
    const isInt=!!bb.rs;$('nextTag').textContent=isInt?t('ivTag'):t('schedTag')
    $('nextTag').className='next-tag '+(isInt?'iv':'sc')
    $('nextAt').textContent=fmtT(bs.getTime())+' '+fmtD(bs.getTime())
    nxtBoss=bb;nxtTime=bs
  }else{$('nextName').textContent='--';$('nextLv').textContent='';$('nextTag').textContent='';$('nextAt').textContent='';nxtBoss=null;nxtTime=null}
}
function rNextCd(){
  if(nxtTime){const r=Math.max(0,nxtTime.getTime()-now());$('nextCd').textContent=fmtDur(r)}else $('nextCd').textContent='--:--:--'
}
setInterval(rNextCd,1000)

function rUpcoming(){
  const n=now(),j=new Date(n+TO);
  const ts=new Date(Date.UTC(j.getUTCFullYear(),j.getUTCMonth(),j.getUTCDate())).getTime()-TO,tt=ts+86400000,ta=ts+172800000;
  $('todayDate').textContent=fmtD(ts);$('tomorrowDate').textContent=fmtD(tt)
  const td=[],tm=[];
  for(const b of BOSSES){const x=nextSpawn(b);if(x){const t=x.getTime();if(t>=n&&t<tt)td.push({b,t});else if(t>=tt&&t<ta)tm.push({b,t})}}
  td.sort((a,b)=>a.t-b.t);tm.sort((a,b)=>a.t-b.t)
  const hl=(l,id)=>{const e=$(id);if(!l.length){e.innerHTML='<div class="empty">'+t('noSpawns')+'</div>';return}
    e.innerHTML=l.map(x=>'<div class="u-entry"><div class="u-info"><span class="u-name">'+bn(x.b)+'</span><span class="u-lv">'+t('lv')+x.b.lvl+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="u-rem">'+fmtShort(x.t-n)+'</span><span class="u-time">'+fmtT(x.t)+'</span></div></div>').join('')}
  hl(td,'todayList');hl(tm,'tomorrowList')
}

function rSched(){
  const j=new Date(now()+TO),cd=j.getUTCDay();
  const order=[1,2,3,4,5,6,0];
  const by=order.map(d=>({d,n:t('days')[d],es:[]}));
  for(const b of schedB())for(const w of b.wr){const col=by.find(x=>x.d===w.d);if(col)col.es.push({b,t:p2(w.h)+':'+p2(w.m)})}
  for(const d of by)d.es.sort((a,b)=>a.t.localeCompare(b.t))
  $('schedGrid').innerHTML=by.map(d=>'<div class="sched-day'+(d.d===cd?' tdy':'')+'"><div class="sched-dlbl">'+d.n+'</div>'+(d.es.length?d.es.map(e=>'<div class="sched-boss"><span class="nm">'+bn(e.b)+'</span><span class="tm">'+e.t+'</span></div>').join(''):'<div class="sched-empty">--</div>')+'</div>').join('')
}

function rInt(){
  const n=now();$('ivGrid').innerHTML=grpInt().map(g=>'<div class="iv-card"><div class="iv-hdr"><span>'+t('every')+' '+fmtInt(g.s)+'</span><span class="ct">'+g.b.length+'</span></div>'+g.b.map(b=>{const et=timers[b.id]?.endTime,al=et&&et>n;return'<div class="iv-row"><span class="nm">'+bn(b)+'</span><span style="display:flex;align-items:center;gap:5px"><span class="lv">'+t('lv')+b.lvl+'</span><span class="tm '+(al?'live':'na')+'">'+(al?fmtShort(et-n):'--')+'</span></span></div>'}).join('')+'</div>').join('')
}

function rAll(){rNext();rUpcoming();rSched();rInt();rNextCd()}

// Separated for refresh intervals
function rBosses(){rSched();rInt()}

const $=(id)=>document.getElementById(id)

$('langBtn').onclick=langNext

function setOnline(on){
  const el=$('status'),st=$('statusText')
  el.querySelector('.status-dot').className='status-dot '+(on?'on':'off')
  st.textContent=on?t('live'):t('offline')
}

async function loadData(){
  try{
    const r=await fetch('data.json?_='+now())
    if(!r.ok)throw Error(r.status)
    const d=await r.json()
    if(d.timers){timers=d.timers;rAll();setOnline(true)}
    if(d.exportedAt){const age=Math.floor((now()-d.exportedAt)/60000);$('exportInfo').textContent=t('updated')+' '+age+'m '+t('ago')}
  }catch(e){setOnline(false);rAll()}
}

lang=localStorage.getItem('astralang')||'en';applyLang();loadData();rAll()
setInterval(loadData,30000)
setInterval(()=>{rUpcoming();rBosses()},15000)
</script>
</body>
</html>
